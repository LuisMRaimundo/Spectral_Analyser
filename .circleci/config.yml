version: 2.1

jobs:
  test:
    parameters:
      python-version:
        type: string

    docker:
      - image: cimg/python:<< parameters.python-version >>

    environment:
      PYTHONUNBUFFERED: "1"
      MPLBACKEND: "Agg"
      QT_QPA_PLATFORM: "offscreen"
      NUMBA_CACHE_DIR: "/tmp/numba_cache"

    steps:
      - checkout

      - run:
          name: Show Python version
          command: python --version

      - run:
          name: Install system audio/plotting dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y \
              ffmpeg \
              libsndfile1 \
              libgl1 \
              libglib2.0-0 \
              libasound2-dev

      - restore_cache:
          keys:
            - v1-pip-{{ arch }}-py<< parameters.python-version >>-{{ checksum "pyproject.toml" }}
            - v1-pip-{{ arch }}-py<< parameters.python-version >>

      - run:
          name: Upgrade pip
          command: |
            python -m pip install --upgrade pip setuptools wheel

      - run:
          name: Install Python package and test dependencies
          command: |
            if [ -f "pyproject.toml" ]; then
              python -m pip install -e ".[dev]" || python -m pip install -e .
            fi

            if [ -f "requirements.txt" ]; then
              python -m pip install -r requirements.txt
            fi

            python -m pip install pytest pytest-cov

      - save_cache:
          key: v1-pip-{{ arch }}-py<< parameters.python-version >>-{{ checksum "pyproject.toml" }}
          paths:
            - ~/.cache/pip

      - run:
          name: Run tests
          command: |
            mkdir -p test-results
            python -m pytest tests -q --junitxml=test-results/junit.xml

      - run:
          name: Run coverage
          command: |
            python -m pytest tests -q --cov=. --cov-report=term-missing

      - store_test_results:
          path: test-results

workflows:
  test-python:
    jobs:
      - test:
          name: test-python-3-10
          python-version: "3.10"

      - test:
          name: test-python-3-11
          python-version: "3.11"
